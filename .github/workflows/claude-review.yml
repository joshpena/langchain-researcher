name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    # Auto-review new/updated PRs, or respond to @claude mentions in comments
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Automatically review all PRs; respond to @claude mentions otherwise
          prompt: |
            Review this pull request. Focus on:
            - Correctness and potential bugs
            - Security vulnerabilities (XSS, injection, auth issues)
            - Performance concerns
            - Adherence to existing code conventions in this repo
            - TypeScript best practices (types, interfaces, error handling)
            - LangChain-specific patterns and practices
            Be concise. Use inline comments for specific line feedback.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          max_turns: 5

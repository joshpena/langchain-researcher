apiVersion: v1
kind: Service
metadata:
  name: langchain-researcher
spec:
  # LoadBalancer provisions a public IP via GCP Cloud Load Balancer.
  # L4 (TCP) load balancing — no HTTP buffering, so SSE streaming works.
  type: LoadBalancer

  # Route traffic to pods with this label
  selector:
    app: langchain-researcher

  ports:
    - protocol: TCP
      # External port (what users hit in their browser)
      port: 80
      # Internal port (what your Next.js app listens on)
      targetPort: 3000
